name: web-ci

on:
  push:
    branches: [main, stg, prod]
  pull_request:
    branches: [main, stg, prod]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dummyfortheci
          CLERK_SECRET_KEY: sk_test_dummyfortheci
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: pnpm build
