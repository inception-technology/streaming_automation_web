name: web-deploy

# Vercel déploie automatiquement via son intégration GitHub :
#   prod      -> déploiement de production (régler "Production Branch" = prod côté Vercel)
#   stg, main -> déploiements de preview
on:
  push:
    branches: [main, stg, prod]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Vercel gère le déploiement automatique via son intégration GitHub.
    # Ce workflow sert uniquement de repère dans l'historique Actions.
    steps:
      - run: echo "Vercel auto-deploys on push. Check the Vercel dashboard for deployment status."
